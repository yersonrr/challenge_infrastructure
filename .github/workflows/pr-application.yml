name: Pull request — Application

on:
  pull_request:
    paths:
      - 'application/**'
      - '.github/workflows/pr-application.yml'

permissions:
  contents: read

jobs:
  check:
    name: Lint and tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: application/url-shortener
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: application/url-shortener/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prettier
        run: pnpm run format:check

      - name: Unit tests
        run: pnpm test
